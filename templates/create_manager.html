<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

html, body{
height:100%;
margin:0;
}

body{
background: linear-gradient(135deg,#8B4513,#D2691E,#FF8C00);
font-family:'Poppins',sans-serif;
color:white;
display:flex;
flex-direction:column;
}

/* Center Content */

.main-container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* Card */

.card-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
border-radius:20px;
padding:40px;
width:100%;
max-width:400px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* Inputs */

.form-control{
background:rgba(255,255,255,0.15);
border:none;
color:white;
border-radius:10px;
padding:12px;
}

.form-control::placeholder{
color:#ffe4c4;
}

/* Button */

.btn-custom{
background:linear-gradient(135deg,#FF8C00,#FF4500);
border:none;
border-radius:10px;
padding:10px;
color:white;
font-weight:600;
}

/* Footer */

footer{
text-align:center;
padding:15px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
border-top:1px solid rgba(255,255,255,0.2);
color:#ffe4c4;
font-size:0.85rem;
}

footer strong{
color:white;
}

</style>
</head>

<body>

<div class="main-container">

<div class="card-box">

<h3>Create Manager</h3>

<form method="POST" autocomplete="off">

<input type="text" name="full_name" class="form-control mb-3" placeholder="Full Name" required>

<input type="text" name="username" class="form-control mb-3" placeholder="Username" required autocomplete="new-username">

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required autocomplete="new-password">

<button type="submit" class="btn btn-custom w-100">Create Manager</button>

</form>

</div>

</div>

<footer>
<p>© 2025 Hostel Dining Management</p>
<p>
Developed by 
<strong>Shafkat Zahoor</strong> & <strong>Bhat Irshad</strong>
</p>
</footer>

</body>
</html>
