<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Manager | Hostel Food Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

html, body {
    height: 100%;
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #b33900 0%, #ff7b00 50%, #e63946 100%);
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
}

/* Navbar */
.navbar {
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 6px 25px rgba(0,0,0,0.35);
}
.navbar-brand {
    font-weight: 700;
    font-size: 1.3rem;
    color: #fff !important;
}
.navbar-text {
    color: #ffe6d0;
    font-weight: 500;
}

/* Back Button Strip (clean + simple) */
.back-bar {
    display: flex;
    justify-content: center;
    margin-top: 25px;
    margin-bottom: 10px;
}

/* Page Container */
.container {
    flex: 1;
    padding: 20px;
}

/* Title */
.page-title {
    font-weight: 700;
    text-align: center;
    margin-bottom: 30px;
}

/* Glass Card */
.card {
    border: none;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    color: white;
    box-shadow: 0 15px 45px rgba(0,0,0,0.4);
    padding: 30px;
    max-width: 500px;
    margin: 0 auto;
}

/* Inputs */
.form-control {
    background: rgba(255,255,255,0.95);
    border: none;
    border-radius: 12px;
    padding: 10px;
    color: #333;
}
.form-control:focus {
    box-shadow: 0 0 0 2px rgba(255,159,28,0.4);
    outline: none;
}

/* Button */
.btn-success {
    background: linear-gradient(135deg,#ff9f1c,#ff5400);
    border: none;
    font-weight: 600;
    padding: 12px;
    border-radius: 12px;
}
.btn-success:hover {
    transform: translateY(-2px);
}

/* Secondary Button */
.btn-secondary {
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 10px;
}
.btn-secondary:hover {
    background: rgba(255,255,255,0.35);
}

/* Footer */
footer {
    text-align: center;
    padding: 15px 0;
    background: rgba(0,0,0,0.3);
    color: white;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand">🏫 Hostel Food Management</a>
    <div class="ms-auto d-flex align-items-center">
        <span class="navbar-text me-3">👤 {{ session['username'] }}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="back-bar">
    <a href="{{ url_for('home') }}" class="btn btn-secondary px-4 py-2">
        🏠 Back to Home
    </a>
</div>

<div class="container">

<h1 class="page-title">➕ Create Manager</h1>

<div class="card">

<form method="POST" autocomplete="off">

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autocomplete="new-username">
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required autocomplete="new-password">
    </div>

    <button type="submit" class="btn btn-success w-100">
        Create Manager
    </button>

</form>

</div>

</div>

<footer>
    <p>© 2025 Hostel Food Management System</p>
    <p>Developed by <strong>Shafkat Zahoor</strong> & <strong>Bhat Irshad</strong></p>
</footer>

</body>
</html>
