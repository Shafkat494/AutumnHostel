<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

html,body{
height:100%;
margin:0;
}

body{
background: linear-gradient(135deg,#8B4513,#D2691E,#FF8C00);
font-family:'Poppins',sans-serif;
color:white;
display:flex;
flex-direction:column;
}

/* Center Container */

.main-container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* Card */

.register-card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.25);
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
padding:40px 30px;
width:100%;
max-width:400px;
text-align:center;
}

/* Title */

.register-title{
font-size:1.8rem;
font-weight:700;
margin-bottom:25px;
}

/* Inputs */

.form-control{
background:rgba(255,255,255,0.15);
border:none;
color:white;
border-radius:10px;
padding:12px;
}

.form-control::placeholder{
color:#ffe4c4;
}

.form-control:focus{
background:rgba(255,255,255,0.2);
color:white;
box-shadow:none;
}

/* Button */

.btn-custom{
background:linear-gradient(135deg,#FF8C00,#FF4500);
border:none;
padding:10px;
border-radius:10px;
font-weight:600;
color:white;
transition:0.3s;
}

.btn-custom:hover{
transform:scale(1.05);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Footer */

footer{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
border-top:1px solid rgba(255,255,255,0.2);
color:#ffe4c4;
font-size:0.9rem;
}

footer strong{
color:white;
}

</style>
</head>

<body>

<div class="main-container">

<div class="register-card">

<div class="register-title">Register Hostel Admin</div>

<form method="POST" autocomplete="off">

<input type="text" name="full_name" class="form-control mb-3" placeholder="Full Name" required autocomplete="off">

<input type="text" name="username" class="form-control mb-3" placeholder="Username" required autocomplete="new-username">

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required autocomplete="new-password">

<div class="mb-3">
    <label class="form-label">Admin Secret Key</label>
    <input type="password" class="form-control" name="admin_key" placeholder="Enter admin key" required>
</div>

<button type="submit" class="btn btn-custom w-100">Register</button>

</form>

</div>

</div>

<!-- FOOTER -->

<footer>

<p>© 2025 Hostel Dining Management</p>

<p>
Developed by
<strong>Shafkat Zahoor</strong> & <strong>Bhat Irshad</strong>
</p>

</footer>

</body>
</html>
