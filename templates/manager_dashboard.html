<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

html, body {
    height: 100%;
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg,#8B4513,#D2691E,#FF8C00);
}

/* Navbar */
.navbar{
    background: rgba(0,0,0,0.25)!important;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 6px 25px rgba(0,0,0,0.35);
}
.navbar-brand{
    font-weight:700;
    color:white!important;
}
.nav-user{
    color:#ffe4c4;
    font-weight:500;
}

/* Dashboard Title */
.dashboard-title{
    font-size:2.2rem;
    font-weight:700;
    text-align:center;
    margin:40px 0;
}

/* Cards */
.card-action{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:18px;
    box-shadow:0 15px 45px rgba(0,0,0,0.35);
    transition: all 0.4s ease;
    padding:28px 20px;
    text-decoration:none;
    color:white;
    display:block;
    min-height:160px;
}
.card-action:hover{
    transform: translateY(-10px) scale(1.02);
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
    color:white;
}
.card-action i{
    font-size:2rem;
    margin-bottom:10px;
}
.card-title{
    font-weight:600;
    font-size:1.1rem;
}
.card-sub{
    color:#ffe4c4;
    font-size:0.9rem;
    margin-top:6px;
}

/* Card Colors (Autumn Gradients) */
.card-bg-primary{
    background:linear-gradient(135deg,#FF8C00,#FF4500);
}
.card-bg-success{
    background:linear-gradient(135deg,#e67e22,#d35400);
}
.card-bg-warning{
    background:linear-gradient(135deg,#f39c12,#e67e22);
}
.card-bg-danger{
    background:linear-gradient(135deg,#c0392b,#922b21);
}

/* Footer */
footer{
    text-align:center;
    padding:20px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    border-top:1px solid rgba(255,255,255,0.2);
    color:#ffe4c4;
    font-size:0.9rem;
    margin-top:auto;
}
footer strong{
    color:white;
}

/* Fade-in animation */
.fade-in{
    animation: fadeIn 0.8s ease-in-out;
}
@keyframes fadeIn{
    from { opacity:0; transform:translateY(20px);}
    to { opacity:1; transform:translateY(0);}
}

/* Responsive */
@media(max-width:576px){
    .nav-user{display:none;}
    .dashboard-title{font-size:1.7rem;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container-fluid">
    <a class="navbar-brand">
        <i class="fas fa-cubes me-2"></i>Manager Dashboard
    </a>

    <div class="d-flex align-items-center ms-auto">
        <div class="nav-user me-3">
            Welcome, {{ session['username'] }}
        </div>

        <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt me-1"></i> Logout
        </a>
    </div>
</div>
</nav>

<!-- MAIN CONTENT -->
<main class="container flex-grow-1 fade-in" style="padding-top:100px; padding-bottom:60px;">
    <h1 class="dashboard-title">Manager Control Panel</h1>

    <div class="row g-4 justify-content-center">

        <div class="col-lg-3 col-md-4 col-sm-6">
            <a href="{{ url_for('menu') }}" class="card-action card-bg-success text-center">
                <i class="fas fa-utensils"></i>
                <div class="card-title">Manage Menu</div>
                <div class="card-sub">Add or remove menu items</div>
            </a>
        </div>

        <div class="col-lg-3 col-md-4 col-sm-6">
            <a href="{{ url_for('attendance_report') }}" class="card-action card-bg-warning text-center">
                <i class="fas fa-clipboard-check"></i>
                <div class="card-title">Attendance Report</div>
                <div class="card-sub">View today's attendance summary</div>
            </a>
        </div>

    </div>
</main>

<!-- FOOTER -->
<footer>
    <p>© 2025 Hostel Dining Management</p>
    <p>Developed by <strong>Shafkat Zahoor</strong> & <strong>Bhat Irshad</strong></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
