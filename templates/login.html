<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Hostel Food Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#b33900,#ff7b00,#e63946);
min-height:100vh;
font-family:'Poppins',sans-serif;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

/* Login Card */

.login-container{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
border-radius:20px;
padding:2rem;
max-width:420px;
width:100%;
box-shadow:0 15px 45px rgba(0,0,0,0.4);
animation:fadeInUp 0.8s ease;
}

/* Title */

h3{
font-weight:700;
text-align:center;
margin-bottom:20px;
}

/* Labels */

label{
font-weight:500;
margin-bottom:4px;
}

/* Inputs */

.form-control{
border-radius:12px;
border:none;
padding:10px;
background:rgba(255,255,255,0.9);
}

.form-control:focus{
box-shadow:0 0 0 2px rgba(255,159,28,0.5);
}

/* Button */

.btn-primary{
background:linear-gradient(135deg,#ff9f1c,#ff5400);
border:none;
font-weight:600;
padding:12px;
border-radius:12px;
}

.btn-primary:hover{
transform:translateY(-2px);
}

/* Back button */

.btn-link{
color:#fff;
text-decoration:none;
}

.btn-link:hover{
color:#ffe4c4;
}

/* Footer */

footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#ffe6d0;
}

/* Animation */

@keyframes fadeInUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* Responsive */

@media(max-width:480px){

.login-container{
padding:1.5rem;
}

}

</style>

</head>

<body>

<div class="login-container">

<h3>Hostel Food Login</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="alert alert-{{ category }} alert-dismissible fade show">
{{ message }}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('login') }}" autocomplete="off">

<div class="mb-3">
<label class="form-label">Login Role</label>
<select class="form-control" name="login_type" required>
<option value="" disabled selected>Select Role</option>
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="student">Student</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" class="form-control" name="username" placeholder="Enter username" autocomplete="off" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" name="password" placeholder="Enter password" autocomplete="new-password" required>
</div>

<button type="submit" class="btn btn-primary w-100">
Login
</button>

</form>

<div class="text-center mt-3">
<a href="{{ url_for('home') }}" class="btn btn-link">⬅ Back to Home</a>
</div>

</div>

<footer>

<p>&copy; 2025 Hostel Food Management System</p>
<p>Developed by <strong>Shafkat Zahoor</strong> & <strong>Bhat Irshad</strong></p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
